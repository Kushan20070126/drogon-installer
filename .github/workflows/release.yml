name: Build Release Artifacts

on:
  push:
    branches:
      - main
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      version:
        description: "Release label used in artifact names (example: v1)"
        required: false
        default: "v1"

permissions:
  contents: write

env:
  RELEASE_VERSION: ${{ github.ref_type == 'tag' && github.ref_name || github.event.inputs.version || format('dev-{0}', github.run_number) }}

jobs:
  build-deb:
    name: Build .deb (Linux)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Build Debian package
        run: python install.py release --version "$RELEASE_VERSION" --targets deb --output-dir release --verbose

      - name: Upload .deb artifact
        uses: actions/upload-artifact@v4
        with:
          name: deb-${{ env.RELEASE_VERSION }}
          path: release/DM-${{ env.RELEASE_VERSION }}.deb
          if-no-files-found: error

  build-exe:
    name: Build .exe (Windows)
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install PyInstaller
        run: python -m pip install --upgrade pip pyinstaller

      - name: Build executable
        run: python install.py release --version "$env:RELEASE_VERSION" --targets exe --output-dir release --verbose

      - name: Upload .exe artifact
        uses: actions/upload-artifact@v4
        with:
          name: exe-${{ env.RELEASE_VERSION }}
          path: release/DM-${{ env.RELEASE_VERSION }}.exe
          if-no-files-found: error

  build-dmg:
    name: Build .dmg (macOS)
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install PyInstaller
        run: python3 -m pip install --upgrade pip pyinstaller

      - name: Build DMG
        run: python3 install.py release --version "$RELEASE_VERSION" --targets dmg --output-dir release --verbose

      - name: Upload .dmg artifact
        uses: actions/upload-artifact@v4
        with:
          name: dmg-${{ env.RELEASE_VERSION }}
          path: release/DB-${{ env.RELEASE_VERSION }}.dmg
          if-no-files-found: error

  publish-release:
    name: Publish GitHub Release
    if: startsWith(github.ref, 'refs/tags/')
    needs:
      - build-deb
      - build-exe
      - build-dmg
    runs-on: ubuntu-latest
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-artifacts
          pattern: "*-${{ env.RELEASE_VERSION }}"
          merge-multiple: true

      - name: Publish release assets
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          files: |
            release-artifacts/DM-${{ env.RELEASE_VERSION }}.deb
            release-artifacts/DM-${{ env.RELEASE_VERSION }}.exe
            release-artifacts/DB-${{ env.RELEASE_VERSION }}.dmg
